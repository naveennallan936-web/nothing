<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adhiparasakthi Engineering College - Login</title>

    <style>
        body{
            margin:0;
            padding:0;
            background:white;
            font-family:Arial, sans-serif;
        }

        .container{
            width:400px;
            margin:60px auto;
            background:white;
            border:2px solid #cc0000;
            border-radius:15px;
            padding:30px;
            text-align:center;
            box-shadow:0px 0px 15px lightgray;
        }

        img{
            width:140px;
            height:140px;
        }

        h2{
            color:#cc0000;
            margin-top:10px;
            font-size:22px;
        }

        h3{
            color:#555;
            margin-bottom:20px;
        }

        input{
            width:90%;
            padding:12px;
            margin:10px 0;
            border:1px solid gray;
            border-radius:5px;
            font-size:16px;
        }

        input[type="submit"]{
            background:#cc0000;
            color:white;
            border:none;
            cursor:pointer;
            font-size:18px;
        }

        input[type="submit"]:hover{
            background:#990000;
        }

        p{
            color:#cc0000;
            font-weight:bold;
        }
    </style>

</head>

<body>

    <div class="container">

        <!-- Place logo.png in the same folder as this HTML file -->
        <img src="Logo.jfif" alt="College Logo">

        <h2>ADHIPARASAKTHI ENGINEERING COLLEGE</h2>
        <h3>Melmaruvathur</h3>

        <form action="#" method="post">

            <input type="text" name="username" placeholder="Username" required>

            <input type="password" name="password" placeholder="Password" required>

            <input type="submit" value="Login">

        </form>

    </div>

</body>
</html>
