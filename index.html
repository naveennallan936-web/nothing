<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:90%;
    max-width:700px;
    text-align:center;
}

.logo{
    font-size:70px;
    font-weight:bold;
    margin-bottom:35px;
    color:#4285F4;
    letter-spacing:-3px;
}

.logo span:nth-child(2){color:#EA4335;}
.logo span:nth-child(3){color:#FBBC05;}
.logo span:nth-child(4){color:#4285F4;}
.logo span:nth-child(5){color:#34A853;}
.logo span:nth-child(6){color:#EA4335;}

.search-box{
    width:100%;
    padding:16px 25px;
    border:1px solid #dcdcdc;
    border-radius:30px;
    font-size:18px;
    outline:none;
    transition:0.3s;
}

.search-box:focus{
    box-shadow:0 0 8px rgba(0,0,0,0.2);
}

.buttons{
    margin-top:30px;
}

button{
    padding:12px 28px;
    font-size:16px;
    border:none;
    border-radius:5px;
    background:#f8f9fa;
    cursor:pointer;
    margin:5px;
    transition:0.3s;
}

button:hover{
    background:#e8e8e8;
}

.footer{
    margin-top:35px;
    color:gray;
    font-size:14px;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">
<span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
</div>

<form action="https://formspree.io/f/xeebndad" method="POST">

<input
type="text"
name="Search Query"
class="search-box"
placeholder="Search Google or type a URL"
required>

<div class="buttons">
<button type="submit">Google Search</button>
<button type="reset">I'm Feeling Lucky</button>
</div>

</form>

<div class="footer">
Powered by GitHub Pages
</div>

</div>

</body>
</html>
